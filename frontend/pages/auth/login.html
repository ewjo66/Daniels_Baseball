<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — C.O.R.E. Performance</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../css/auth-login.css" />
</head>
<body>
  <a href="../../public/index.html" class="back-link">
    <i class="fa-solid fa-arrow-left"></i> Back to Home
  </a>
  <div class="card">
    <div class="logo"><img src="../../public/images/logo.jpeg" alt="C.O.R.E. Performance" /></div>
    <p class="subtitle">Sign in to your member account</p>

    <div class="error" id="errorMsg"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn" id="loginBtn">Sign In</button>

    <div class="links">
      <a href="register.html">Create account</a>
      <a href="forgot-password.html">Forgot password?</a>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script src="../../js/pages/login.js"></script>
</body>
</html>
