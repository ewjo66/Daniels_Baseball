<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — C.O.R.E. Performance</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0A0F1E; --navy-card: #161E2E; --red: #C8102E;
      --gold: #F5C518; --white: #F9FAFB; --gray-300: #9CA3AF;
      --gray-500: #6B7280; --border: rgba(255,255,255,0.1);
    }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--navy-card); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 440px; }
    .logo { font-family: 'Oswald', sans-serif; font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
    .logo span { color: var(--red); }
    .subtitle { color: var(--gray-300); font-size: 0.9rem; margin-bottom: 36px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--gray-300); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    input { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-size: 0.95rem; font-family: 'Inter', sans-serif; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: var(--red); }
    input::placeholder { color: var(--gray-500); }
    .btn { width: 100%; padding: 14px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.2s; margin-top: 8px; }
    .btn:hover { background: #A50E26; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .links { text-align: center; margin-top: 20px; }
    .links a { font-size: 0.85rem; color: var(--gray-300); text-decoration: none; transition: color 0.2s; }
    .links a:hover { color: var(--white); }
    .error { background: rgba(200,16,46,0.15); border: 1px solid rgba(200,16,46,0.4); border-radius: 8px; padding: 12px 16px; font-size: 0.875rem; color: #ff8a96; margin-bottom: 20px; display: none; }
    .error.show { display: block; }
    .success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.35); border-radius: 8px; padding: 24px; text-align: center; display: none; }
    .success.show { display: block; }
    .success-icon { font-size: 2rem; margin-bottom: 12px; }
    .success-title { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #4ade80; margin-bottom: 8px; }
    .success-text { font-size: 0.875rem; color: var(--gray-300); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">C.O.R.E. <span>Performance</span></div>
    <p class="subtitle">Enter your email to receive a reset link</p>

    <div class="error" id="errorMsg"></div>

    <div id="formArea">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
      </div>

      <button class="btn" id="resetBtn" onclick="handleReset()">Send Reset Link</button>

      <div class="links">
        <a href="login.html">Back to sign in</a>
      </div>
    </div>

    <div class="success" id="successArea">
      <div class="success-icon">&#9993;</div>
      <div class="success-title">Check Your Email</div>
      <p class="success-text">If an account exists for that email address, you'll receive a password reset link shortly.</p>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script>
    redirectIfLoggedIn();

    async function handleReset() {
      const btn   = document.getElementById('resetBtn');
      const error = document.getElementById('errorMsg');
      const email = document.getElementById('email').value.trim();

      error.classList.remove('show');

      if (!email) {
        error.textContent = 'Please enter your email address.';
        return error.classList.add('show');
      }

      btn.disabled    = true;
      btn.textContent = 'Sending…';

      try {
        await api.auth.forgotPassword(email);
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('successArea').classList.add('show');
      } catch (err) {
        // Show success regardless to avoid email enumeration
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('successArea').classList.add('show');
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleReset();
    });
  </script>
</body>
</html>
