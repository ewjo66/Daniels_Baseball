<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — C.O.R.E. Performance</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0A0F1E; --navy-card: #161E2E; --red: #C8102E;
      --gold: #F5C518; --white: #F9FAFB; --gray-300: #9CA3AF;
      --gray-500: #6B7280; --border: rgba(255,255,255,0.1);
    }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--navy-card); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 440px; }
    .logo { font-family: 'Oswald', sans-serif; font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
    .logo span { color: var(--red); }
    .subtitle { color: var(--gray-300); font-size: 0.9rem; margin-bottom: 36px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--gray-300); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    input { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-size: 0.95rem; font-family: 'Inter', sans-serif; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: var(--red); }
    input::placeholder { color: var(--gray-500); }
    .btn { width: 100%; padding: 14px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.2s; margin-top: 8px; }
    .btn:hover { background: #A50E26; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .links { text-align: center; margin-top: 20px; }
    .links a { font-size: 0.85rem; color: var(--gray-300); text-decoration: none; transition: color 0.2s; }
    .links a:hover { color: var(--white); }
    .error { background: rgba(200,16,46,0.15); border: 1px solid rgba(200,16,46,0.4); border-radius: 8px; padding: 12px 16px; font-size: 0.875rem; color: #ff8a96; margin-bottom: 20px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">C.O.R.E. <span>Performance</span></div>
    <p class="subtitle">Create your member account</p>

    <div class="error" id="errorMsg"></div>

    <div class="row">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="Daniel" autocomplete="given-name" />
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Smith" autocomplete="family-name" />
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
    </div>

    <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>

    <div class="links">
      <a href="login.html">Already have an account? Sign in</a>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script>
    redirectIfLoggedIn();

    async function handleRegister() {
      const btn            = document.getElementById('registerBtn');
      const error          = document.getElementById('errorMsg');
      const firstName      = document.getElementById('firstName').value.trim();
      const lastName       = document.getElementById('lastName').value.trim();
      const email          = document.getElementById('email').value.trim();
      const password       = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      error.classList.remove('show');

      if (!firstName || !lastName || !email || !password || !confirmPassword) {
        error.textContent = 'Please fill in all fields.';
        return error.classList.add('show');
      }

      if (password.length < 8) {
        error.textContent = 'Password must be at least 8 characters.';
        return error.classList.add('show');
      }

      if (password !== confirmPassword) {
        error.textContent = 'Passwords do not match.';
        return error.classList.add('show');
      }

      btn.disabled    = true;
      btn.textContent = 'Creating account…';

      try {
        await api.auth.register({ first_name: firstName, last_name: lastName, email, password });
        location.href = '/pages/member/dashboard.html';
      } catch (err) {
        error.textContent = err.message || 'Registration failed. Please try again.';
        error.classList.add('show');
        btn.disabled    = false;
        btn.textContent = 'Create Account';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleRegister();
    });
  </script>
</body>
</html>
