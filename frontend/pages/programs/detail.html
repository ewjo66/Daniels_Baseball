<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Program — C.O.R.E. Performance</title>
  <meta name="description" content="Data-driven baseball training program. View the curriculum and enroll to start training with purpose." />
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Program — C.O.R.E. Performance" />
  <meta property="og:description" content="Data-driven baseball training program. View the curriculum and enroll to start training with purpose." />
  <meta property="og:image"       content="https://www.danielsbaseballacademy.com/og-image.jpg" />
  <meta name="twitter:card"       content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0A0F1E; --navy-card: #161E2E; --navy-light: #1E2A3A;
      --red: #C8102E; --gold: #F5C518; --white: #F9FAFB;
      --gray-300: #9CA3AF; --gray-500: #6B7280; --border: rgba(255,255,255,0.08);
    }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; }

    .topnav { background: var(--navy-card); border-bottom: 1px solid var(--border); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .topnav-logo { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; text-decoration: none; color: var(--white); }
    .topnav-logo span { color: var(--red); }
    .topnav-links { display: flex; align-items: center; gap: 24px; }
    .topnav-links a { font-size: 0.875rem; color: var(--gray-300); text-decoration: none; transition: color 0.2s; }
    .topnav-links a:hover { color: var(--white); }
    .topnav-links a.btn-nav { background: var(--red); color: #fff; padding: 8px 18px; border-radius: 6px; font-weight: 600; }
    .topnav-links a.btn-nav:hover { background: #A50E26; color: #fff; }

    .back-bar { padding: 20px 40px; border-bottom: 1px solid var(--border); }
    .back-link { display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--gray-300); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--white); }

    .container { max-width: 900px; margin: 0 auto; padding: 48px 40px; }

    /* Hero Section */
    .program-hero { display: grid; grid-template-columns: 1fr 320px; gap: 48px; align-items: start; margin-bottom: 48px; }
    .hero-tag { display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--red); background: rgba(200,16,46,0.1); padding: 4px 14px; border-radius: 20px; margin-bottom: 20px; }
    .program-title { font-family: 'Oswald', sans-serif; font-size: 2.4rem; font-weight: 700; text-transform: uppercase; letter-spacing: -0.01em; line-height: 1.1; margin-bottom: 16px; }
    .program-desc { color: var(--gray-300); line-height: 1.7; font-size: 1rem; margin-bottom: 24px; }
    .meta-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--gray-300); }
    .meta-item i { color: var(--red); }

    /* Enroll Card */
    .enroll-card { background: var(--navy-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; position: sticky; top: 24px; }
    .enroll-price { font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
    .enroll-price.free { color: #4ade80; }
    .enroll-price.paid { color: var(--gold); }
    .enroll-sublabel { font-size: 0.8rem; color: var(--gray-500); margin-bottom: 24px; }
    .enroll-btn { width: 100%; padding: 14px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-bottom: 12px; }
    .enroll-btn:hover { background: #A50E26; }
    .enroll-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .enroll-note { font-size: 0.78rem; color: var(--gray-500); text-align: center; line-height: 1.5; }
    .enroll-note a { color: var(--red); text-decoration: none; }

    /* Paywall state */
    .paywall-box { background: rgba(200,16,46,0.06); border: 1px solid rgba(200,16,46,0.2); border-radius: 10px; padding: 16px; margin-bottom: 16px; text-align: center; }
    .paywall-box i { font-size: 1.3rem; color: var(--red); margin-bottom: 8px; display: block; }
    .paywall-box p { font-size: 0.8rem; color: var(--gray-300); line-height: 1.5; }

    /* Success enrolled state */
    .enrolled-box { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); border-radius: 10px; padding: 16px; text-align: center; }
    .enrolled-box i { font-size: 1.3rem; color: #4ade80; margin-bottom: 8px; display: block; }
    .enrolled-box p { font-size: 0.8rem; color: var(--gray-300); }
    .enrolled-box a { color: var(--red); text-decoration: none; font-weight: 600; }

    /* Content Sections */
    .section-title { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .week-block { background: var(--navy-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .week-label { font-family: 'Oswald', sans-serif; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; color: var(--red); margin-bottom: 8px; }
    .week-title { font-weight: 600; margin-bottom: 8px; }
    .week-tasks { list-style: none; }
    .week-tasks li { font-size: 0.875rem; color: var(--gray-300); padding: 5px 0; display: flex; align-items: center; gap: 8px; }
    .week-tasks li::before { content: ''; width: 6px; height: 6px; background: var(--red); border-radius: 50%; flex-shrink: 0; }

    .loading { text-align: center; padding: 80px; color: var(--gray-500); }
    .error-state { text-align: center; padding: 80px 24px; color: var(--gray-500); }
    .error-state i { font-size: 2rem; margin-bottom: 16px; display: block; }
    .error-state a { color: var(--red); text-decoration: none; }
  </style>
</head>
<body>

  <nav class="topnav">
    <a class="topnav-logo" href="/"><span>C.O.R.E.</span> Performance</a>
    <div class="topnav-links">
      <a href="/">Home</a>
      <a href="list.html">Programs</a>
      <a href="/pages/member/dashboard.html" class="btn-nav">Member Portal</a>
    </div>
  </nav>

  <div class="back-bar">
    <a class="back-link" href="list.html"><i class="fa-solid fa-arrow-left"></i> All Programs</a>
  </div>

  <div class="container" id="pageContent">
    <div class="loading"><i class="fa-solid fa-spinner fa-spin" style="font-size:1.5rem;margin-bottom:12px;display:block"></i>Loading program…</div>
  </div>

  <script src="../../js/api.js"></script>
  <script>
    const slug = new URLSearchParams(location.search).get('slug');
    let currentUser = null;

    async function init() {
      if (!slug) {
        location.href = 'list.html';
        return;
      }

      // Try to get current user (don't redirect if not logged in — public page)
      try {
        const { user } = await api.auth.me();
        currentUser = user;
      } catch { /* not logged in */ }

      try {
        const { program } = await api.programs.get(slug);
        renderProgram(program);
      } catch (err) {
        if (err.data?.paywall) {
          renderPaywallGate(err.status === 401 ? 'login' : 'upgrade');
        } else if (err.status === 404) {
          renderError('Program not found.', true);
        } else {
          renderError('Failed to load program. Please try again.');
        }
      }
    }

    function renderProgram(program) {
      document.title = `${program.name} — C.O.R.E. Performance`;
      const isFree   = program.price_cents === 0;
      const content  = Array.isArray(program.content) ? program.content : [];

      document.getElementById('pageContent').innerHTML = `
        <div class="program-hero">
          <div>
            <div class="hero-tag">Training Program</div>
            <h1 class="program-title">${program.name}</h1>
            <p class="program-desc">${program.description || ''}</p>
            <div class="meta-row">
              ${program.duration_days ? `<div class="meta-item"><i class="fa-regular fa-clock"></i>${program.duration_days} days</div>` : ''}
              ${program.members_only ? `<div class="meta-item"><i class="fa-solid fa-lock"></i>Members only</div>` : '<div class="meta-item"><i class="fa-solid fa-unlock"></i>Open access</div>'}
              <div class="meta-item"><i class="fa-solid fa-chart-line"></i>Data-driven training</div>
            </div>
          </div>

          <div class="enroll-card">
            <div class="enroll-price ${isFree ? 'free' : 'paid'}">${isFree ? 'Free' : formatPrice(program.price_cents)}</div>
            <div class="enroll-sublabel">${isFree ? 'No cost to enroll' : 'one-time fee'}</div>
            <div id="enrollAction">
              ${renderEnrollAction(program)}
            </div>
          </div>
        </div>

        ${content.length > 0 ? `
          <div class="section-title">Program Curriculum</div>
          ${content.map(week => `
            <div class="week-block">
              <div class="week-label">Week ${week.week}</div>
              <div class="week-title">${week.title}</div>
              <ul class="week-tasks">
                ${(week.tasks || []).map(t => `<li>${t}</li>`).join('')}
              </ul>
            </div>
          `).join('')}
        ` : ''}
      `;
    }

    function renderEnrollAction(program) {
      if (!currentUser) {
        return `
          <button class="enroll-btn" onclick="location.href='/pages/auth/login.html?return=${encodeURIComponent(location.pathname + location.search)}'">
            Sign In to Enroll
          </button>
          <p class="enroll-note">Don't have an account? <a href="/pages/auth/register.html">Create one free</a></p>
        `;
      }
      return `
        <button class="enroll-btn" id="enrollBtn" onclick="enroll(${program.id})">Enroll Now</button>
        <p class="enroll-note">You'll be redirected to your dashboard after enrolling.</p>
      `;
    }

    async function enroll(programId) {
      const btn = document.getElementById('enrollBtn');
      btn.disabled    = true;
      btn.textContent = 'Enrolling…';

      // Enrollment API endpoint to be wired when available
      setTimeout(() => {
        document.getElementById('enrollAction').innerHTML = `
          <div class="enrolled-box">
            <i class="fa-solid fa-circle-check"></i>
            <p>You're enrolled! <a href="/pages/member/dashboard.html">Go to My Programs →</a></p>
          </div>
        `;
      }, 800);
    }

    function renderPaywallGate(reason) {
      document.getElementById('pageContent').innerHTML = `
        <div style="max-width:480px;margin:80px auto;text-align:center">
          <i class="fa-solid fa-lock" style="font-size:3rem;color:var(--red);margin-bottom:24px;display:block"></i>
          <h2 style="font-family:'Oswald',sans-serif;font-size:1.6rem;text-transform:uppercase;margin-bottom:12px">Members Only</h2>
          <p style="color:var(--gray-300);margin-bottom:32px;line-height:1.6">
            ${reason === 'login'
              ? 'Sign in to access this program.'
              : 'An active membership is required to access this program.'}
          </p>
          ${reason === 'login'
            ? `<a href="/pages/auth/login.html" style="background:var(--red);color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase">Sign In</a>`
            : `<a href="/" style="background:var(--red);color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase">View Plans</a>`}
        </div>
      `;
    }

    function renderError(msg, showBack = false) {
      document.getElementById('pageContent').innerHTML = `
        <div class="error-state">
          <i class="fa-solid fa-circle-exclamation"></i>
          <p>${msg}</p>
          ${showBack ? '<br><a href="list.html">← Back to Programs</a>' : ''}
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
