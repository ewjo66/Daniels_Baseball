<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm Booking — C.O.R.E. Performance</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../css/booking-form.css" />
</head>
<body>
  <div class="card">
    <a class="back-link" href="calendar.html"><i class="fa-solid fa-arrow-left"></i> Back to Calendar</a>
    <div class="logo">C.O.R.E. <span>Performance</span></div>

    <div id="formArea">
      <div class="booking-summary">
        <div class="summary-title" id="summaryService">—</div>
        <div class="summary-row">
          <span class="summary-label"><i class="fa-regular fa-calendar icon-mr"></i>Date & Time</span>
          <span class="summary-value" id="summaryDateTime">—</span>
        </div>
        <div class="summary-row">
          <span class="summary-label"><i class="fa-solid fa-user icon-mr"></i>Coach</span>
          <span class="summary-value" id="summaryCoach">—</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">Total</span>
          <span class="summary-price" id="summaryPrice">—</span>
        </div>
      </div>

      <div class="error" id="errorMsg"></div>

      <div class="form-group">
        <label for="notes">Notes for your coach <span class="label-hint">(optional)</span></label>
        <textarea id="notes" placeholder="Any goals, injuries, or things you'd like to focus on…"></textarea>
      </div>

      <div class="payment-note">
        <i class="fa-solid fa-circle-info"></i>
        <span>Your booking will be reserved as <strong>pending</strong>. Payment processing will be available once Stripe is connected.</span>
      </div>

      <button class="btn" id="bookBtn">Confirm Booking</button>
    </div>

    <div class="success" id="successArea">
      <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
      <div class="success-title">Booking Confirmed!</div>
      <p class="success-text">Your session has been reserved. You'll find it in your dashboard under My Bookings.</p>
      <a class="success-link" href="../member/dashboard.html">Go to Dashboard</a>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script src="../../js/pages/booking-form.js"></script>
</body>
</html>
